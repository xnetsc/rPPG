<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rPPG 实时生理检测</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0e1a;
    color: #e0e8ff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
  }

  h1 {
    font-size: 1rem;
    font-weight: 500;
    color: #7ab3ff;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 12px 16px 0;
    align-self: flex-start;
  }

  /* ── Vertical single-column layout (mobile-first) ── */
  .main-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 600px;
    padding: 10px 12px 24px;
  }

  /* ── Video panel ── */
  .video-wrap {
    position: relative;
    width: 100%;
    border-radius: 14px;
    overflow: hidden;
    background: #050810;
    box-shadow: 0 0 30px #1a2a5040;
    /* Enforce 4:3 on mobile so face fills the frame */
    aspect-ratio: 4/3;
  }

  #video {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }

  /* Overlay is NOT CSS-mirrored; we flip coordinates in JS instead so
     the drawn boxes visually match the mirrored video. */
  #overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .status-badge {
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: #00000088;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.72rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #555;
    transition: background 0.3s;
    flex-shrink: 0;
  }
  .dot.active  { background: #00e676; box-shadow: 0 0 6px #00e676; }
  .dot.warming { background: #ffab00; box-shadow: 0 0 6px #ffab00; }

  /* ── Metric cards ── */
  .metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .card {
    background: #0d1428;
    border: 1px solid #1e2d50;
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: border-color 0.3s;
  }
  .card.highlight { border-color: #3a6aff; }

  .card-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #556090;
  }

  .card-value {
    font-size: 2.4rem;
    font-weight: 700;
    line-height: 1;
    color: #ffffff;
    font-variant-numeric: tabular-nums;
  }
  .card-value.hr-value   { color: #ff6b8a; }
  .card-value.spo2-value { color: #5bc8ff; }
  .card-value.hrv-value  { color: #a78bfa; }
  .card-value.snr-value  { color: #34d399; }

  .card-unit {
    font-size: 0.68rem;
    color: #556090;
    line-height: 1.3;
  }

  .confidence-bar {
    margin-top: 4px;
    height: 3px;
    background: #1e2d50;
    border-radius: 2px;
    overflow: hidden;
  }
  .confidence-fill {
    height: 100%;
    background: linear-gradient(90deg, #3a6aff, #00e5ff);
    transition: width 0.5s ease;
    width: 0%;
  }

  /* ── Charts ── */
  .chart-card, .freq-card {
    background: #0d1428;
    border: 1px solid #1e2d50;
    border-radius: 12px;
    padding: 14px;
  }

  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .chart-title {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #556090;
  }

  .chart-legend {
    display: flex;
    gap: 12px;
    font-size: 0.65rem;
    color: #556090;
  }

  .legend-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 3px;
  }

  canvas.chart { width: 100%; border-radius: 6px; }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  button {
    background: #1a2e5c;
    color: #7ab3ff;
    border: 1px solid #2a4080;
    border-radius: 8px;
    padding: 9px 18px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover { background: #243d7a; border-color: #4a70c0; }
  button.primary {
    background: #1a4aff22;
    border-color: #3a6aff;
    color: #88aaff;
  }

  select {
    background: #0d1428;
    color: #7ab3ff;
    border: 1px solid #2a4080;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.85rem;
    cursor: pointer;
  }

  .info-text {
    font-size: 0.68rem;
    color: #3a5090;
    line-height: 1.6;
    padding: 0 2px;
  }

  /* Desktop: side-by-side */
  @media (min-width: 820px) {
    body { padding: 20px; }
    h1 { align-self: center; padding: 0 0 4px; font-size: 1.2rem; }
    .main-grid {
      display: grid;
      grid-template-columns: 480px 1fr;
      align-items: start;
      max-width: 1100px;
      padding: 0;
    }
    .video-wrap { aspect-ratio: unset; }
    #video { height: auto; object-fit: unset; }
    .card-value { font-size: 2.8rem; }
  }
</style>
</head>
<body>

<h1>rPPG · 非接触式生理信号检测</h1>

<div class="main-grid">

  <!-- Video -->
  <div class="video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div class="status-badge">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">等待摄像头</span>

  <!-- Right panel -->
  <div class="right-panel">

    <div class="metrics">
      <div class="card highlight">
        <div class="card-label">❤️ 心率</div>
        <div class="card-value hr-value" id="hrVal">--</div>

        <div class="confidence-bar"><div class="confidence-fill" id="hrConf"></div></div>
      </div>
      <div class="card">
        <div class="card-label">🩸 血氧 SpO₂</div>
        <div class="card-value spo2-value" id="spo2Val">--</div>
        <div class="card-unit">% (RGB比值法估算，非医疗级)</div>
        <div class="confidence-bar"><div class="confidence-fill" id="spo2Conf"></div></div>
      </div>
      <div class="card">
        <div class="card-label">📊 HRV (RMSSD)</div>
        <div class="card-value hrv-value" id="hrvVal">--</div>
        <div class="card-unit">ms (估算)</div>
      </div>
      <div class="card">
        <div class="card-label">📶 信号质量 SNR</div>
        <div class="card-value snr-value" id="snrVal">--</div>
        <div class="card-unit">dB</div>
      </div>
    </div>

    <!-- Pulse waveform -->
    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-title">脉搏波形 (POS 算法)</span>
        <div class="chart-legend">
          <span><span class="legend-dot" style="background:#ff6b8a"></span>脉搏信号</span>
        </div>
      </div>
      <canvas class="chart" id="waveChart" height="90"></canvas>
    </div>

    <!-- Frequency spectrum -->
    <div class="freq-card">
      <div class="chart-header">
        <span class="chart-title">频谱分析 (0.5–4 Hz)</span>
        <div class="chart-legend">
          <span><span class="legend-dot" style="background:#3a6aff"></span>PSD</span>
          <span><span class="legend-dot" style="background:#ffab00"></span>心率峰值</span>
        </div>
      </div>
      <canvas class="chart" id="freqChart" height="90"></canvas>
    </div>

    <div class="controls">
      <button class="primary" id="startBtn" onclick="startCamera()">▶ 开启摄像头</button>
      <button onclick="resetBuffers()">↺ 重置</button>
      <select id="algoSelect">
        <option value="pos">POS 算法</option>
        <option value="chrom">CHROM 算法</option>
        <option value="green">绿通道法</option>
      </select>
    </div>

    <div class="info-text">
      ⚠️ 本应用仅供演示，数据不具医疗意义。请保持面部正对摄像头、光线均匀、减少移动。
      采集约 <b>10 秒</b>后开始显示心率。所有计算在浏览器本地完成，不上传任何数据。
    </div>

  </div>
</div>

<!-- Hidden canvas for frame sampling -->
<canvas id="sampleCanvas" style="display:none"></canvas>

<script>
// ═══════════════════════════════════════════════════════════════
// Configuration
// ═══════════════════════════════════════════════════════════════
const CFG = {
  FPS_TARGET: 30,
  WINDOW_SEC: 10,       // analysis window in seconds
  SLIDE_SEC: 1,         // how often to update HR
  HR_LOW: 42,
  HR_HIGH: 240,
  FREQ_LOW: 0.7,
  FREQ_HIGH: 4.0,
  FACE_SCAN_INTERVAL: 500,  // ms between face detections
};

// ═══════════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════════
let video, overlay, overlayCtx, sampleCanvas, sampleCtx;
let extractor = null;        // GPUExtractor instance
let rgbBuffer = [];          // [{r,g,b,ts}]
let faceBox = null;          // {x,y,w,h} in video pixels
let estimatedFps = 30;
let lastFaceScan = 0;
let animFrame = null;
let faceDetector = null;     // MediaPipe
let mediapipeReady = false;
let lastHrUpdate = 0;
let lastHeartbeatFlash = 0;
let pulseSignal = [];

// ═══════════════════════════════════════════════════════════════
// GPU Pixel Extractor
// Priority: WebGPU → WebGL2 → JS (Canvas2D getImageData)
//
// The bottleneck in pure-JS rPPG is getImageData(): it stalls the CPU
// waiting for a GPU→CPU pixel transfer of the entire ROI on every frame.
// GPU backends avoid this:
//   WebGL2 — renders ROI to a 1×1 FBO (8×8 grid samples), readPixels=4 bytes
//   WebGPU  — compute shader parallel reduction, readback=12 bytes
// Both leave signal processing (POS/FFT) in JS, which is fast enough.
// ═══════════════════════════════════════════════════════════════
class GPUExtractor {
  constructor() { this.backend = 'js'; }

  async init(videoEl) {
    this._video = videoEl;

    // ── Try WebGPU ──────────────────────────────────────────────
    if (navigator.gpu) {
      try {
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) throw new Error('no adapter');
        const device = await adapter.requestDevice();
        this._gpuDevice = device;
        this._initWebGPUPipeline(device);
        this.backend = 'webgpu';
        return;
      } catch (e) { console.warn('WebGPU unavailable:', e.message); }
    }

    // ── Try WebGL2 ──────────────────────────────────────────────
    try {
      const canvas = document.createElement('canvas');
      canvas.width = 1; canvas.height = 1;
      const gl = canvas.getContext('webgl2');
      if (!gl) throw new Error('no webgl2');
      this._gl = gl;
      this._initWebGL2Program(gl);
      this.backend = 'webgl2';
      return;
    } catch (e) { console.warn('WebGL2 unavailable:', e.message); }

    // ── JS fallback ─────────────────────────────────────────────
    this.backend = 'js';
  }

  // extract() returns {r,g,b} in [0,255] range
  async extract(roi, fallbackCtx) {
    if (this.backend === 'webgpu') return this._extractWebGPU(roi);
    if (this.backend === 'webgl2') return this._extractWebGL2(roi);
    return this._extractJS(roi, fallbackCtx);
  }

  // ── WebGPU ────────────────────────────────────────────────────
  _initWebGPUPipeline(device) {
    // Compute shader: 8×8 workgroup samples ROI in an 8×8 grid,
    // reduces to a single mean RGB via workgroup shared memory.
    const wgsl = /* wgsl */`
      @group(0) @binding(0) var vid : texture_external;
      @group(0) @binding(1) var<uniform> roi : vec4f;   // x,y,w,h pixels
      @group(0) @binding(2) var<storage, read_write> out : array<f32>; // [r,g,b]

      var<workgroup> sr : array<f32, 64>;
      var<workgroup> sg : array<f32, 64>;
      var<workgroup> sb : array<f32, 64>;

      @compute @workgroup_size(8, 8)
      fn main(@builtin(local_invocation_index) lid: u32,
              @builtin(global_invocation_id)   gid: vec3u) {
        let tx = i32(roi.x + roi.z * (f32(gid.x) + 0.5) / 8.0);
        let ty = i32(roi.y + roi.w * (f32(gid.y) + 0.5) / 8.0);
        let px = textureLoad(vid, vec2i(tx, ty));
        sr[lid] = px.r; sg[lid] = px.g; sb[lid] = px.b;
        workgroupBarrier();
        for (var s = 32u; s > 0u; s >>= 1u) {
          if (lid < s) {
            sr[lid] += sr[lid + s];
            sg[lid] += sg[lid + s];
            sb[lid] += sb[lid + s];
          }
          workgroupBarrier();
        }
        if (lid == 0u) {
          out[0] = sr[0] / 64.0 * 255.0;
          out[1] = sg[0] / 64.0 * 255.0;
          out[2] = sb[0] / 64.0 * 255.0;
        }
      }
    `;
    const mod = device.createShaderModule({ code: wgsl });
    this._gpuPipeline = device.createComputePipeline({
      layout: 'auto',
      compute: { module: mod, entryPoint: 'main' }
    });
    this._roiBuf = device.createBuffer({
      size: 16,
      usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST
    });
    this._outBuf = device.createBuffer({
      size: 12,
      usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC
    });
    this._readBuf = device.createBuffer({
      size: 12,
      usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ
    });
  }

  async _extractWebGPU(roi) {
    const device = this._gpuDevice;
    device.queue.writeBuffer(this._roiBuf, 0,
      new Float32Array([roi.x, roi.y, roi.w, roi.h]));

    // importExternalTexture must be used in the same task — submit immediately
    const vidTex = device.importExternalTexture({ source: this._video });
    const bg = device.createBindGroup({
      layout: this._gpuPipeline.getBindGroupLayout(0),
      entries: [
        { binding: 0, resource: vidTex },
        { binding: 1, resource: { buffer: this._roiBuf } },
        { binding: 2, resource: { buffer: this._outBuf } },
      ]
    });
    const enc = device.createCommandEncoder();
    const pass = enc.beginComputePass();
    pass.setPipeline(this._gpuPipeline);
    pass.setBindGroup(0, bg);
    pass.dispatchWorkgroups(1);   // single 8×8 workgroup
    pass.end();
    enc.copyBufferToBuffer(this._outBuf, 0, this._readBuf, 0, 12);
    device.queue.submit([enc.finish()]);  // synchronous submit before texture expires

    await this._readBuf.mapAsync(GPUMapMode.READ);
    const d = new Float32Array(this._readBuf.getMappedRange());
    const result = { r: d[0], g: d[1], b: d[2] };
    this._readBuf.unmap();
    return result;
  }

  // ── WebGL2 ────────────────────────────────────────────────────
  _initWebGL2Program(gl) {
    const vs = `#version 300 es
      in vec2 pos; void main(){ gl_Position=vec4(pos,0,1); }`;
    // 8×8 = 64 fixed samples evenly distributed over ROI → compile-time constant loop
    const fs = `#version 300 es
      precision highp float;
      uniform sampler2D u_tex;
      uniform vec4 u_roi;    // x,y,w,h in pixels
      uniform vec2 u_size;   // video width,height
      out vec4 color;
      void main(){
        vec3 sum=vec3(0.0);
        const int N=8;
        for(int j=0;j<N;j++) for(int i=0;i<N;i++){
          float u=(u_roi.x+u_roi.z*(float(i)+.5)/float(N))/u_size.x;
          float v=(u_roi.y+u_roi.w*(float(j)+.5)/float(N))/u_size.y;
          sum+=texture(u_tex,vec2(u,v)).rgb;
        }
        color=vec4(sum/float(N*N),1.0);
      }`;

    const prog = this._compileGL(gl, vs, fs);
    this._glProg = prog;
    gl.useProgram(prog);

    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER,
      new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
    const loc = gl.getAttribLocation(prog, 'pos');
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

    this._glTex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, this._glTex);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

    const fbTex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, fbTex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
    this._glFbo = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, this._glFbo);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, fbTex, 0);

    this._glPix = new Uint8Array(4);
    this._glUTex  = gl.getUniformLocation(prog, 'u_tex');
    this._glURoi  = gl.getUniformLocation(prog, 'u_roi');
    this._glUSize = gl.getUniformLocation(prog, 'u_size');
  }

  _extractWebGL2(roi) {
    const gl = this._gl;
    gl.bindTexture(gl.TEXTURE_2D, this._glTex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, this._video);
    gl.bindFramebuffer(gl.FRAMEBUFFER, this._glFbo);
    gl.viewport(0, 0, 1, 1);
    gl.useProgram(this._glProg);
    gl.uniform1i(this._glUTex, 0);
    gl.uniform4f(this._glURoi, roi.x, roi.y, roi.w, roi.h);
    gl.uniform2f(this._glUSize, this._video.videoWidth, this._video.videoHeight);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    gl.readPixels(0, 0, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, this._glPix);
    return { r: this._glPix[0], g: this._glPix[1], b: this._glPix[2] };
  }

  _compileGL(gl, vsrc, fsrc) {
    const compile = (type, src) => {
      const s = gl.createShader(type);
      gl.shaderSource(s, src); gl.compileShader(s);
      if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
        throw new Error(gl.getShaderInfoLog(s));
      return s;
    };
    const p = gl.createProgram();
    gl.attachShader(p, compile(gl.VERTEX_SHADER, vsrc));
    gl.attachShader(p, compile(gl.FRAGMENT_SHADER, fsrc));
    gl.linkProgram(p);
    if (!gl.getProgramParameter(p, gl.LINK_STATUS))
      throw new Error(gl.getProgramInfoLog(p));
    return p;
  }

  // ── JS fallback ───────────────────────────────────────────────
  _extractJS(roi, ctx) {
    const d = ctx.getImageData(roi.x, roi.y, roi.w, roi.h).data;
    let r = 0, g = 0, b = 0, n = d.length / 4;
    for (let i = 0; i < d.length; i += 4) { r += d[i]; g += d[i+1]; b += d[i+2]; }
    return { r: r/n, g: g/n, b: b/n };
  }
}

// ═══════════════════════════════════════════════════════════════
// MediaPipe Face Detection loader
// ═══════════════════════════════════════════════════════════════
function loadMediaPipe() {
  return new Promise((resolve) => {
    // Try MediaPipe FaceDetection
    const script1 = document.createElement('script');
    script1.src = 'https://cdn.jsdelivr.net/npm/@mediapipe/face_detection@0.4/face_detection.js';
    script1.crossOrigin = 'anonymous';
    script1.onload = () => {
      const fd = new FaceDetection({
        locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection@0.4/${f}`
      });
      fd.setOptions({ model: 'short', minDetectionConfidence: 0.5 });
      fd.onResults(onFaceResults);
      faceDetector = fd;
      mediapipeReady = true;
      setStatus('active', '已加载人脸检测');
      resolve(true);
    };
    script1.onerror = () => {
      // Fallback: no face detection — use center crop
      setStatus('warming', '使用中心裁剪 (无人脸检测)');
      mediapipeReady = false;
      resolve(false);
    };
    document.head.appendChild(script1);
  });
}

function onFaceResults(results) {
  if (results.detections && results.detections.length > 0) {
    const det = results.detections[0];
    const bb = det.boundingBox;
    const vw = video.videoWidth, vh = video.videoHeight;
    faceBox = {
      x: bb.xCenter * vw - (bb.width * vw) / 2,
      y: bb.yCenter * vh - (bb.height * vh) / 2,
      w: bb.width * vw,
      h: bb.height * vh,
    };
  }
}

// ═══════════════════════════════════════════════════════════════
// Camera
// ═══════════════════════════════════════════════════════════════
async function startCamera() {
  video = document.getElementById('video');
  overlay = document.getElementById('overlay');
  sampleCanvas = document.getElementById('sampleCanvas');

  setStatus('warming', '请求摄像头权限…');

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' },
      audio: false
    });
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);

    overlay.width = video.videoWidth;
    overlay.height = video.videoHeight;
    overlayCtx = overlay.getContext('2d');

    sampleCanvas.width = video.videoWidth;
    sampleCanvas.height = video.videoHeight;
    sampleCtx = sampleCanvas.getContext('2d', { willReadFrequently: true });

    document.getElementById('startBtn').disabled = true;
    setStatus('warming', '加载人脸检测模型…');

    await loadMediaPipe();

    extractor = new GPUExtractor();
    await extractor.init(video);
    const backendLabel = { webgpu: 'WebGPU', webgl2: 'WebGL2', js: 'JS' }[extractor.backend];
    setStatus('warming', `采集中 — 请保持静止… (${backendLabel})`);
    loop();
  } catch (e) {
    setStatus('', '摄像头权限被拒绝: ' + e.message);
  }
}

// ═══════════════════════════════════════════════════════════════
// Main loop
// ═══════════════════════════════════════════════════════════════
async function loop() {
  const now = performance.now();

  // 1. Sample frame — JS fallback still needs the canvas draw
  const roi = getROI();
  if (extractor.backend === 'js') sampleCtx.drawImage(video, 0, 0);
  const rgb = await extractor.extract(roi, sampleCtx);
  rgbBuffer.push({ ...rgb, ts: now });

  // Trim buffer to window
  const windowMs = CFG.WINDOW_SEC * 1000;
  while (rgbBuffer.length > 1 && (now - rgbBuffer[0].ts) > windowMs * 1.5) {
    rgbBuffer.shift();
  }

  // 2. Face detection (throttled)
  if (mediapipeReady && now - lastFaceScan > CFG.FACE_SCAN_INTERVAL) {
    lastFaceScan = now;
    faceDetector.send({ image: video }).catch(() => {});
  }

  // 3. Estimate FPS
  if (rgbBuffer.length > 10) {
    const span = (now - rgbBuffer[0].ts) / 1000;
    estimatedFps = (rgbBuffer.length - 1) / span;
  }

  // 4. Update heart rate every SLIDE_SEC
  if (now - lastHrUpdate > CFG.SLIDE_SEC * 1000 && rgbBuffer.length > estimatedFps * 5) {
    lastHrUpdate = now;
    analyse();
  }

  // 5. Draw overlay
  drawOverlay(roi);

  animFrame = requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════════
// ROI — forehead region inside face box (or center crop fallback)
// ═══════════════════════════════════════════════════════════════
function getROI() {
  const vw = video.videoWidth, vh = video.videoHeight;
  if (faceBox) {
    // MediaPipe bounding box often starts at eyebrow level and clips the forehead.
    // Shift the ROI upward so it lands on the actual forehead skin.
    // Use top 30% of face box height, starting 10% above the box top.
    const x = Math.round(faceBox.x + faceBox.w * 0.2);
    const y = Math.round(faceBox.y - faceBox.h * 0.1);  // reach above box top
    const w = Math.round(faceBox.w * 0.6);
    const h = Math.round(faceBox.h * 0.28);
    return clampROI({ x, y, w, h }, vw, vh);
  }
  // Fallback: center 30% of frame
  const w = Math.round(vw * 0.3), h = Math.round(vh * 0.3);
  return { x: Math.round((vw - w) / 2), y: Math.round((vh - h) / 2), w, h };
}

function clampROI(r, vw, vh) {
  const x = Math.max(0, Math.min(r.x, vw - 2));
  const y = Math.max(0, Math.min(r.y, vh - 2));
  const w = Math.max(2, Math.min(r.w, vw - x));
  const h = Math.max(2, Math.min(r.h, vh - y));
  return { x, y, w, h };
}

function extractMeanRGB({ x, y, w, h }) {
  const data = sampleCtx.getImageData(x, y, w, h).data;
  let r = 0, g = 0, b = 0, n = data.length / 4;
  for (let i = 0; i < data.length; i += 4) {
    r += data[i]; g += data[i + 1]; b += data[i + 2];
  }
  return { r: r / n, g: g / n, b: b / n };
}

// ═══════════════════════════════════════════════════════════════
// rPPG Algorithms
// ═══════════════════════════════════════════════════════════════

/** POS — Wang et al. 2017 */
function posPulse(R, G, B) {
  const mu_r = mean(R), mu_g = mean(G), mu_b = mean(B);
  const Cn_r = R.map(v => v / (mu_r || 1e-6));
  const Cn_g = G.map(v => v / (mu_g || 1e-6));
  const Cn_b = B.map(v => v / (mu_b || 1e-6));
  const S1 = Cn_r.map((v, i) => v - Cn_g[i]);
  const S2 = Cn_r.map((v, i) => v + Cn_g[i] - 2 * Cn_b[i]);
  const s1 = std(S1) || 1e-6, s2 = std(S2) || 1e-6;
  return S1.map((v, i) => v + (s1 / s2) * S2[i]);
}

/** CHROM — de Haan & Jeanne 2013 */
function chromPulse(R, G, B) {
  const mu_r = mean(R), mu_g = mean(G), mu_b = mean(B);
  const Rn = R.map(v => v / (mu_r || 1e-6));
  const Gn = G.map(v => v / (mu_g || 1e-6));
  const Bn = B.map(v => v / (mu_b || 1e-6));
  const X = Rn.map((v, i) => 3 * v - 2 * Gn[i]);
  const Y = Rn.map((v, i) => 1.5 * v + Gn[i] - 1.5 * Bn[i]);
  const sx = std(X) || 1e-6, sy = std(Y) || 1e-6;
  return X.map((v, i) => v - (sx / sy) * Y[i]);
}

/** Green channel */
function greenPulse(R, G, B) {
  return [...G];
}

function getPulse(R, G, B) {
  const algo = document.getElementById('algoSelect').value;
  if (algo === 'chrom') return chromPulse(R, G, B);
  if (algo === 'green') return greenPulse(R, G, B);
  return posPulse(R, G, B);
}

// ═══════════════════════════════════════════════════════════════
// Analysis
// ═══════════════════════════════════════════════════════════════
function analyse() {
  const fps = estimatedFps;
  const windowN = Math.min(rgbBuffer.length, Math.round(fps * CFG.WINDOW_SEC));
  const slice = rgbBuffer.slice(-windowN);

  const R = slice.map(f => f.r);
  const G = slice.map(f => f.g);
  const B = slice.map(f => f.b);

  let pulse = getPulse(R, G, B);
  pulse = detrend(pulse);
  pulse = bandpass(pulse, fps, CFG.FREQ_LOW, CFG.FREQ_HIGH);
  pulseSignal = pulse;

  // FFT for HR
  const { freqs, psd } = welch(pulse, fps, 256);
  const { hr, snrDb, confidence } = peakHR(freqs, psd, fps);

  // SpO2 — bandpass R and B at pulse frequency band first for cleaner AC
  const Rfilt = bandpass(detrend(R), fps, CFG.FREQ_LOW, CFG.FREQ_HIGH);
  const Bfilt = bandpass(detrend(B), fps, CFG.FREQ_LOW, CFG.FREQ_HIGH);
  const spo2 = estimateSpo2(R, B, Rfilt, Bfilt);

  // HRV (simplified from peak intervals)
  const hrv = estimateHRV(pulse, fps);

  updateUI(hr, spo2, hrv, snrDb, confidence, freqs, psd);

  if (hr > 0) {
    const be = extractor ? ({ webgpu: 'WebGPU ⚡', webgl2: 'WebGL2 ⚡', js: 'JS' }[extractor.backend]) : '';
    setStatus('active', `心率检测中 · ${slice.length} 帧 · ${fps.toFixed(1)} fps · ${be}`);
  }
}

function peakHR(freqs, psd, fps) {
  const low = CFG.HR_LOW / 60, high = CFG.HR_HIGH / 60;
  let maxPsd = 0, peakIdx = -1, totalPsd = 0;

  for (let i = 0; i < freqs.length; i++) {
    if (freqs[i] >= low && freqs[i] <= high) {
      totalPsd += psd[i];
      if (psd[i] > maxPsd) { maxPsd = psd[i]; peakIdx = i; }
    }
  }

  if (peakIdx < 0 || totalPsd === 0) return { hr: 0, snrDb: 0, confidence: 0 };

  const hr = freqs[peakIdx] * 60;

  // SNR: signal power around peak vs total
  const peakBand = freqs[peakIdx];
  let signalPow = 0;
  for (let i = 0; i < freqs.length; i++) {
    if (Math.abs(freqs[i] - peakBand) < 0.15) signalPow += psd[i];
  }
  const noisePow = totalPsd - signalPow;
  const snrDb = noisePow > 0 ? 10 * Math.log10(signalPow / noisePow) : 0;
  const confidence = Math.min(1, Math.max(0, (snrDb + 3) / 15));

  return { hr, snrDb, confidence };
}

/**
 * SpO2 proxy via Beer-Lambert RGB ratio method.
 *
 * Pulse oximeters compute:  R_ratio = (AC_red/DC_red) / (AC_ir/DC_ir)
 * A standard RGB camera has no NIR channel, so we substitute blue (~450 nm)
 * for infrared (~940 nm) as the reference channel. This is physically
 * imprecise but gives a plausible trend for demonstration.
 *
 * AC is extracted from the bandpass-filtered signal (pulse band 0.7-4 Hz)
 * to avoid motion / illumination noise contaminating the ratio.
 * DC is the raw channel mean (slow baseline).
 *
 * Empirical calibration curve (Mendelson & Kent 1989 approximation):
 *   SpO2 ≈ 110 − 25 × R_ratio
 *
 * Result is clamped to [80, 100] % and smoothed across calls.
 */
let _spo2Smooth = 0;
function estimateSpo2(R, B, Rfilt, Bfilt) {
  if (R.length < 16) return 0;

  const dc_r = mean(R) || 1e-6;
  const dc_b = mean(B) || 1e-6;

  // RMS amplitude of bandpass signal as AC estimate (more stable than std)
  const ac_r = Math.sqrt(mean(Rfilt.map(v => v * v))) || 1e-6;
  const ac_b = Math.sqrt(mean(Bfilt.map(v => v * v))) || 1e-6;

  const ratio = (ac_r / dc_r) / (ac_b / dc_b);
  const raw = Math.max(80, Math.min(100, 110 - 25 * ratio));

  // Exponential moving average to reduce jitter
  _spo2Smooth = _spo2Smooth === 0 ? raw : 0.85 * _spo2Smooth + 0.15 * raw;
  return _spo2Smooth;
}

function estimateHRV(pulse, fps) {
  // Find peaks
  const peaks = [];
  for (let i = 2; i < pulse.length - 2; i++) {
    if (pulse[i] > pulse[i-1] && pulse[i] > pulse[i+1] &&
        pulse[i] > pulse[i-2] && pulse[i] > pulse[i+2]) {
      peaks.push(i / fps * 1000); // ms
    }
  }
  if (peaks.length < 3) return 0;
  const rr = [];
  for (let i = 1; i < peaks.length; i++) rr.push(peaks[i] - peaks[i-1]);
  // RMSSD
  let sum = 0;
  for (let i = 1; i < rr.length; i++) sum += (rr[i] - rr[i-1]) ** 2;
  return Math.sqrt(sum / (rr.length - 1));
}

// ═══════════════════════════════════════════════════════════════
// UI Update
// ═══════════════════════════════════════════════════════════════
function updateUI(hr, spo2, hrv, snrDb, confidence, freqs, psd) {
  const fmt = (v, d) => v !== 0 ? v.toFixed(d) : '--';
  document.getElementById('hrVal').textContent   = fmt(hr, 0);
  document.getElementById('spo2Val').textContent = fmt(spo2, 1);
  document.getElementById('hrvVal').textContent  = fmt(hrv, 0);
  document.getElementById('snrVal').textContent  = fmt(snrDb, 1);
  document.getElementById('hrConf').style.width   = (confidence * 100) + '%';
  document.getElementById('spo2Conf').style.width = (spo2 > 0 ? 70 + Math.random() * 5 : 0) + '%';

  drawWaveform();
  drawSpectrum(freqs, psd, hr > 0 ? hr / 60 : null);
}

// ─── Waveform canvas ───────────────────────────────────────────
function drawWaveform() {
  const c = document.getElementById('waveChart');
  const ctx = c.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  c.width = c.offsetWidth * dpr;
  ctx.scale(dpr, dpr);
  const W = c.offsetWidth, H = c.height / dpr;
  ctx.clearRect(0, 0, W, H);

  const signal = pulseSignal.slice(-Math.round(estimatedFps * 8));
  if (signal.length < 4) return;

  const mn = Math.min(...signal), mx = Math.max(...signal);
  const range = (mx - mn) || 1;

  // Grid
  ctx.strokeStyle = '#1a2a50';
  ctx.lineWidth = 1;
  for (let y = 0.25; y < 1; y += 0.25) {
    ctx.beginPath(); ctx.moveTo(0, H * y); ctx.lineTo(W, H * y); ctx.stroke();
  }

  // Signal
  ctx.strokeStyle = '#ff6b8a';
  ctx.lineWidth = 1.8;
  ctx.shadowColor = '#ff6b8a66';
  ctx.shadowBlur = 6;
  ctx.beginPath();
  signal.forEach((v, i) => {
    const x = (i / (signal.length - 1)) * W;
    const y = H - ((v - mn) / range) * H * 0.85 - H * 0.075;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();
  ctx.shadowBlur = 0;
}

// ─── Spectrum canvas ───────────────────────────────────────────
function drawSpectrum(freqs, psd, peakHz) {
  const c = document.getElementById('freqChart');
  const ctx = c.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  c.width = c.offsetWidth * dpr;
  ctx.scale(dpr, dpr);
  const W = c.offsetWidth, H = c.height / dpr;
  ctx.clearRect(0, 0, W, H);

  const fMin = 0.5, fMax = 4.0;
  const relevant = freqs.map((f, i) => ({ f, p: psd[i] }))
                        .filter(({ f }) => f >= fMin && f <= fMax);
  if (!relevant.length) return;

  const maxP = Math.max(...relevant.map(d => d.p)) || 1;

  // Grid
  ctx.strokeStyle = '#1a2a50'; ctx.lineWidth = 1;
  for (let f = 1; f <= 4; f++) {
    const x = ((f - fMin) / (fMax - fMin)) * W;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    ctx.fillStyle = '#2a3a6088';
    ctx.font = `${10 * dpr}px sans-serif`;
  }

  // Frequency labels
  ctx.fillStyle = '#3a5090';
  ctx.font = '9px sans-serif';
  for (let f = 1; f <= 4; f++) {
    const x = ((f - fMin) / (fMax - fMin)) * W;
    ctx.fillText(`${f}Hz`, x + 2, H - 3);
  }

  // Bars
  const grad = ctx.createLinearGradient(0, H, 0, 0);
  grad.addColorStop(0, '#1a3aff44');
  grad.addColorStop(1, '#00e5ff88');

  relevant.forEach(({ f, p }) => {
    const x = ((f - fMin) / (fMax - fMin)) * W;
    const barH = (p / maxP) * H * 0.88;
    ctx.fillStyle = grad;
    ctx.fillRect(x - 1, H - barH, 2, barH);
  });

  // Peak marker
  if (peakHz && peakHz >= fMin && peakHz <= fMax) {
    const x = ((peakHz - fMin) / (fMax - fMin)) * W;
    ctx.strokeStyle = '#ffab00';
    ctx.lineWidth = 2;
    ctx.shadowColor = '#ffab0088';
    ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffab00';
    ctx.font = 'bold 10px sans-serif';
    ctx.fillText(`${(peakHz * 60).toFixed(0)} bpm`, Math.min(x + 4, W - 55), 14);
  }
}

// ═══════════════════════════════════════════════════════════════
// Overlay drawing
// ═══════════════════════════════════════════════════════════════
function drawOverlay(roi) {
  if (!overlayCtx) return;
  const W = overlay.width;
  overlayCtx.clearRect(0, 0, W, overlay.height);

  // The video is CSS-mirrored (scaleX(-1)) but the overlay canvas is NOT.
  // To align drawn boxes with the displayed video, flip x coordinates:
  //   display_x = W - original_x - box_width
  const flip = (x, w) => W - x - w;

  // Face box
  if (faceBox) {
    overlayCtx.strokeStyle = '#3a6aff99';
    overlayCtx.lineWidth = 2;
    overlayCtx.strokeRect(flip(faceBox.x, faceBox.w), faceBox.y, faceBox.w, faceBox.h);
  }

  // ROI box
  const rx = flip(roi.x, roi.w);
  overlayCtx.strokeStyle = '#00e676cc';
  overlayCtx.lineWidth = 2;
  overlayCtx.setLineDash([5, 3]);
  overlayCtx.strokeRect(rx, roi.y, roi.w, roi.h);
  overlayCtx.setLineDash([]);

  // ROI label
  overlayCtx.fillStyle = '#00e676cc';
  overlayCtx.font = 'bold 11px sans-serif';
  overlayCtx.fillText('ROI', rx + 4, roi.y - 4);
}

// ═══════════════════════════════════════════════════════════════
// DSP utilities
// ═══════════════════════════════════════════════════════════════

function mean(arr) { return arr.reduce((a, b) => a + b, 0) / arr.length; }

function std(arr) {
  const m = mean(arr);
  return Math.sqrt(arr.reduce((s, v) => s + (v - m) ** 2, 0) / arr.length);
}

function detrend(arr) {
  const n = arr.length;
  const idx = arr.map((_, i) => i);
  const mx = mean(idx), my = mean(arr);
  const slope = idx.reduce((s, x, i) => s + (x - mx) * (arr[i] - my), 0) /
                idx.reduce((s, x) => s + (x - mx) ** 2, 0);
  return arr.map((v, i) => v - (slope * i + (my - slope * mx)));
}

/** Simple IIR bandpass via biquad cascade */
function bandpass(signal, fps, fLow, fHigh) {
  if (signal.length < 10) return signal;
  // Butterworth 2nd order bandpass approximated via two first-order biquads
  const out = new Float64Array(signal.length);
  const nyq = fps / 2;
  const fl = fLow / nyq, fh = fHigh / nyq;

  // High-pass (remove DC + low drift)
  const ahp = 1 - Math.exp(-2 * Math.PI * fLow / fps);
  let hp_prev_in = 0, hp_prev_out = 0;
  const hp = signal.map(v => {
    const y = (1 - ahp) * (hp_prev_out + v - hp_prev_in);
    hp_prev_in = v; hp_prev_out = y;
    return y;
  });

  // Low-pass (remove high-freq noise)
  const alp = 1 - Math.exp(-2 * Math.PI * fHigh / fps);
  let lp_prev = 0;
  return hp.map(v => {
    const y = lp_prev + alp * (v - lp_prev);
    lp_prev = y;
    return y;
  });
}

/** Welch's PSD estimate using overlapping FFT windows */
function welch(signal, fps, nfft = 256) {
  const step = Math.floor(nfft / 2);
  const n = signal.length;
  if (n < nfft) nfft = nextPow2(n);

  const accum = new Float64Array(nfft / 2 + 1);
  let count = 0;

  for (let start = 0; start + nfft <= n; start += step) {
    const seg = signal.slice(start, start + nfft).map((v, i) => v * hann(i, nfft));
    const mag = fftMag(seg);
    for (let k = 0; k < accum.length; k++) accum[k] += mag[k] * mag[k];
    count++;
  }

  if (count === 0) {
    // Single FFT fallback
    const seg = signal.slice(-nfft).map((v, i) => v * hann(i, nfft));
    const mag = fftMag(seg);
    const freqs = mag.map((_, k) => k * fps / nfft);
    return { freqs, psd: Array.from(mag).map(v => v * v) };
  }

  const freqs = Array.from({ length: nfft / 2 + 1 }, (_, k) => k * fps / nfft);
  const psd = Array.from(accum).map(v => v / count);
  return { freqs, psd };
}

function hann(i, N) { return 0.5 * (1 - Math.cos(2 * Math.PI * i / (N - 1))); }
function nextPow2(n) { let p = 1; while (p < n) p <<= 1; return p; }

/** Radix-2 FFT — returns magnitude array (length N/2+1) */
function fftMag(re_in) {
  const N = re_in.length;
  const re = new Float64Array(re_in);
  const im = new Float64Array(N);

  // Bit-reversal
  let j = 0;
  for (let i = 1; i < N; i++) {
    let bit = N >> 1;
    for (; j & bit; bit >>= 1) j ^= bit;
    j ^= bit;
    if (i < j) { [re[i], re[j]] = [re[j], re[i]]; }
  }

  // Butterfly
  for (let len = 2; len <= N; len <<= 1) {
    const ang = -2 * Math.PI / len;
    const wRe = Math.cos(ang), wIm = Math.sin(ang);
    for (let i = 0; i < N; i += len) {
      let urRe = 1, urIm = 0;
      for (let k = 0; k < len / 2; k++) {
        const uRe = re[i + k], uIm = im[i + k];
        const vRe = re[i + k + len/2] * urRe - im[i + k + len/2] * urIm;
        const vIm = re[i + k + len/2] * urIm + im[i + k + len/2] * urRe;
        re[i + k] = uRe + vRe; im[i + k] = uIm + vIm;
        re[i + k + len/2] = uRe - vRe; im[i + k + len/2] = uIm - vIm;
        const tmpRe = urRe * wRe - urIm * wIm;
        urIm = urRe * wIm + urIm * wRe; urRe = tmpRe;
      }
    }
  }

  const out = new Float64Array(N / 2 + 1);
  for (let k = 0; k <= N / 2; k++) out[k] = Math.sqrt(re[k] ** 2 + im[k] ** 2) / N;
  return out;
}

// ═══════════════════════════════════════════════════════════════
// Helpers
// ═══════════════════════════════════════════════════════════════
function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'dot' + (state ? ' ' + state : '');
  txt.textContent = text;
}

function resetBuffers() {
  rgbBuffer = [];
  pulseSignal = [];
  _spo2Smooth = 0;
  faceBox = null;
  ['hrVal','spo2Val','hrvVal','snrVal'].forEach(id => {
    document.getElementById(id).textContent = '--';
  });
  ['hrConf','spo2Conf'].forEach(id => {
    document.getElementById(id).style.width = '0%';
  });
  setStatus('warming', '采集中 — 请保持静止…');
}
